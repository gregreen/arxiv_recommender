# docker-compose.yml — arXiv Recommender
#
# Prerequisites (on the server):
#   1. Copy your secret files:
#        scp api_keys.json user@server:/srv/arxiv-recommender/
#        scp email_config.json user@server:/srv/arxiv-recommender/
#   2. Create .env:
#        SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))")
#        DOMAIN=yourdomain.com
#        CORS_ALLOW_ORIGINS=https://yourdomain.com
#
# First deploy / update:
#   docker compose up -d --build

services:

  # ── API server ───────────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - data:/app/data
      - ./api_keys.json:/app/api_keys.json:ro
      - ./email_config.json:/app/email_config.json:ro
    # Ofelia reads these labels to schedule periodic jobs inside this container.
    labels:
      ofelia.enabled: "true"
      # Ingest new papers Sun–Thu at 20:30, 21:30, 22:30, 23:30 NYC time (soon after arXiv's daily update)
      ofelia.job-exec.daily-ingest.schedule: "0 30 20,21,22,23 * * 0,1,2,3,4"
      ofelia.job-exec.daily-ingest.command: "python3 scripts/cron_daily.py"
      # Cleanup old embeddings every day at 3:00 AM (NYC time, safely after daily ingest)
      ofelia.job-exec.cleanup.schedule: "0 0 3 * * *"
      ofelia.job-exec.cleanup.command: "python3 scripts/cleanup_embeddings.py"
      # Cleanup old source files every day at 3:30 AM (NYC time)
      ofelia.job-exec.source-cleanup.schedule: "0 30 3 * * *"
      ofelia.job-exec.source-cleanup.command: "python3 scripts/arxiv_source_cleanup.py"
      ofelia.job-exec.source-cleanup.timezone: "America/New_York"
      # Cleanup old completed tasks every day at 4:00 AM (NYC time)
      ofelia.job-exec.cleanup-tasks.schedule: "0 0 4 * * *"
      ofelia.job-exec.cleanup-tasks.command: "python3 scripts/cleanup_tasks.py"
      ofelia.job-exec.cleanup-tasks.timezone: "America/New_York"

  # ── Metadata daemon ──────────────────────────────────────────────────────────
  meta-daemon:
    build: .
    restart: unless-stopped
    command: python3 daemons/meta_daemon.py
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - data:/app/data
      - ./api_keys.json:/app/api_keys.json:ro

  # ── Embedding daemon ─────────────────────────────────────────────────────────
  embed-daemon:
    build: .
    restart: unless-stopped
    command: python3 daemons/embed_daemon.py
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - data:/app/data
      - ./api_keys.json:/app/api_keys.json:ro

  # ── Caddy (TLS-terminating reverse proxy) ───────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api

  # ── Scheduler (Ofelia: executes periodic jobs inside the api container) ──────
  scheduler:
    image: mcuadros/ofelia:latest
    command: daemon --docker
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - TZ=America/New_York # Ofelia ignores per-job timezone labels; use host TZ instead
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── Backup (restic → cloud object storage) ──────────────────────────────────
  # Requires RESTIC_PASSWORD, RESTIC_REPOSITORY, and backend credentials
  # to be set in .env. See scripts/backup.sh for full setup instructions.
  backup:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backup
    restart: unless-stopped
    entrypoint: ["tail", "-f", "/dev/null"]
    env_file: .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - data:/app/data:ro
      - ./scripts/backup.sh:/app/scripts/backup.sh:ro
    labels:
      ofelia.enabled: "true"
      # Run daily at 05:00 NYC time (Ofelia uses the TZ from the scheduler container)
      ofelia.job-exec.backup.schedule: "0 0 5 * * *"
      ofelia.job-exec.backup.command: "/bin/sh /app/scripts/backup.sh"

volumes:
  # 'data' is a Docker-managed named volume. Docker stores it at:
  #   /var/lib/docker/volumes/<project>_data/_data/
  # To use a fixed, human-accessible host path instead, remove this entry and
  # replace all 'data:/app/data' volume mounts above with a bind mount, e.g.:
  #   - /srv/arxiv-recommender/data:/app/data
  data:          # app.db, embeddings_cache.db, and all cache directories
  caddy-data:    # Caddy TLS certificates (persisted across restarts)
  caddy-config:  # Caddy runtime config
